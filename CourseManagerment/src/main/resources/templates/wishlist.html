<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách yêu thích | CourseManager</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23ff6b35'>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    <style>
        .wishlist-page {
            padding: var(--spacing-3xl) var(--spacing-lg);
            min-height: calc(100vh - 80px);
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.08) 0%, rgba(255, 107, 53, 0.05) 100%);
        }

        .wishlist-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: var(--spacing-2xl);
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .wishlist-count {
            color: var(--accent-primary);
            font-weight: 700;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-xl);
        }

        /* Wishlist course card */
        .wishlist-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
        }

        .wishlist-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-primary);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.15);
        }

        .wishlist-card .card-image-wrapper {
            position: relative;
            height: 160px;
            overflow: hidden;
            background: var(--bg-hover);
        }

        .wishlist-card .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-normal);
        }

        .wishlist-card:hover .card-image {
            transform: scale(1.05);
        }

        .wishlist-card .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .wishlist-card:hover .card-overlay {
            opacity: 1;
        }

        .wishlist-remove-btn {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }

        .wishlist-remove-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .wishlist-card .card-content {
            padding: var(--spacing-lg);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .wishlist-card .course-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .wishlist-card .instructor-name {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            margin-bottom: var(--spacing-md);
        }

        .wishlist-card .course-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: var(--spacing-md);
        }

        .wishlist-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .wishlist-card .price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .wishlist-card .enroll-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .wishlist-card .enroll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
        }

        .wishlist-card .enrolled-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .wishlist-card .added-date {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: var(--spacing-sm);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--spacing-3xl);
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-xl);
        }

        .empty-state i {
            width: 80px;
            height: 80px;
            color: var(--text-tertiary);
            margin-bottom: var(--spacing-xl);
            opacity: 0.4;
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
            font-family: var(--font-display);
            font-size: 1.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
        }

        .explore-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .explore-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.8rem; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <th:block th:insert="~{fragments/navbar :: navbar}"></th:block>

    <div class="wishlist-page">
        <div class="wishlist-container">
            <!-- Page Header -->
            <div class="page-header">
                <h1>Danh sách yêu thích</h1>
                <p>Bạn đã lưu <span class="wishlist-count" id="wishlistCount">0</span> khóa học</p>
            </div>

            <!-- Wishlist Grid -->
            <div class="courses-grid" id="wishlistContainer">
                <!-- Loaded via API -->
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2024 CourseManager</p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/toast.js}"></script>
    <script th:src="@{/js/api.js}"></script>

    <script>
        let allWishlistItems = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadWishlist();
        });

        async function loadWishlist() {
            const token = window.AuthManager?.getToken?.();
            if (!token) {
                showLoginPrompt();
                return;
            }

            showLoading('wishlistContainer', 6);

            try {
                const data = await ApiService.getWishlist({ page: 0, size: 50 });
                allWishlistItems = data.content || [];
                const total = data.totalElements || 0;

                document.getElementById('wishlistCount').textContent = total;

                if (allWishlistItems.length === 0) {
                    showEmptyState();
                } else {
                    renderWishlist();
                }
            } catch (error) {
                console.error('Failed to load wishlist:', error);
                showEmptyState('Không thể tải danh sách yêu thích.');
            }
        }

        function renderWishlist() {
            const container = document.getElementById('wishlistContainer');
            container.innerHTML = allWishlistItems.map(item => {
                const course = item.courseId ? {
                    id: item.courseId,
                    title: item.courseTitle,
                    thumbnailUrl: item.thumbnailUrl || item.courseThumbnail,
                    level: item.courseLevel,
                    instructorName: item.instructorName,
                    rating: item.rating,
                    studentCount: item.studentCount,
                    price: 0
                } : {
                    id: item.courseId,
                    title: item.courseTitle,
                    thumbnailUrl: item.thumbnailUrl,
                    level: item.courseLevel,
                    instructorName: item.instructorName,
                    rating: item.rating,
                    studentCount: item.studentCount,
                    price: 0
                };

                const price = course.price ? `$${parseFloat(course.price).toFixed(2)}` : 'Miễn phí';
                const thumbnail = course.thumbnailUrl || 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=225&fit=crop';
                const addedDate = item.addedAt ? formatDate(item.addedAt) : '';

                return `
                    <div class="course-card wishlist-card" data-course-id="${course.id}">
                        <div class="card-image-wrapper">
                            <a href="/courses/${course.id}">
                                <img src="${thumbnail}" alt="${course.title}" class="card-image"
                                     onerror="this.src='https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=225&fit=crop'">
                            </a>
                            <div class="card-overlay">
                                <button class="wishlist-remove-btn" onclick="handleRemoveFromWishlist(${course.id}, this)">
                                    <i data-feather="trash-2"></i>
                                    Xóa khỏi danh sách
                                </button>
                            </div>
                        </div>
                        <div class="card-content">
                            <a href="/courses/${course.id}" style="text-decoration: none;">
                                <h3 class="course-title">${course.title}</h3>
                            </a>
                            <p class="instructor-name">${course.instructorName || 'Giảng viên'}</p>
                            <div class="course-meta">
                                <span class="rating">
                                    <i data-feather="star" style="width:14px;height:14px;color:#fbbf24;fill:#fbbf24;"></i>
                                    ${course.rating ? course.rating.toFixed(1) : '0.0'}
                                </span>
                                <span><i data-feather="users" style="width:14px;height:14px;"></i> ${course.studentCount || 0}</span>
                                <span>${course.level || 'Mọi cấp độ'}</span>
                            </div>
                            ${addedDate ? `<p class="added-date">Đã thêm: ${addedDate}</p>` : ''}
                            <div class="card-footer">
                                <span class="price">${price}</span>
                                <button class="enroll-btn" onclick="handleEnrollFromWishlist(${course.id}, this)">
                                    <i data-feather="log-in" style="width:14px;height:14px;"></i>
                                    Ghi danh
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            feather.replace();
        }

        function showEmptyState(message) {
            const container = document.getElementById('wishlistContainer');
            container.innerHTML = `
                <div style="grid-column: 1 / -1;">
                    <div class="empty-state">
                        <i data-feather="heart"></i>
                        <h3>Chưa có khóa học yêu thích</h3>
                        <p>${message || 'Hãy khám phá các khóa học và thêm vào danh sách yêu thích.'}</p>
                        <a href="/courses" class="explore-btn">
                            <i data-feather="search" style="width:18px;height:18px;"></i>
                            Khám phá khóa học
                        </a>
                    </div>
                </div>
            `;
            feather.replace();
        }

        function showLoginPrompt() {
            const container = document.getElementById('wishlistContainer');
            container.innerHTML = `
                <div style="grid-column: 1 / -1;">
                    <div class="empty-state">
                        <i data-feather="lock"></i>
                        <h3>Đăng nhập để xem wishlist</h3>
                        <p>Vui lòng đăng nhập để xem danh sách khóa học yêu thích của bạn.</p>
                        <a href="/login?redirect=/wishlist" class="explore-btn">
                            <i data-feather="log-in" style="width:18px;height:18px;"></i>
                            Đăng nhập
                        </a>
                    </div>
                </div>
            `;
            feather.replace();
        }

        function showLoading(containerId, count) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = Array(count).fill(`
                <div class="course-card wishlist-card skeleton">
                    <div class="card-image-wrapper" style="background: var(--bg-hover); animation: pulse 1.5s ease-in-out infinite;">
                        <div style="width:100%;height:100%;background:linear-gradient(90deg,var(--bg-hover) 25%,var(--border-color) 50%,var(--bg-hover) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;"></div>
                    </div>
                    <div class="card-content">
                        <div style="height:1.2em;width:85%;background:linear-gradient(90deg,var(--bg-hover) 25%,var(--border-color) 50%,var(--bg-hover) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px;"></div>
                        <div style="height:0.9em;width:55%;background:linear-gradient(90deg,var(--bg-hover) 25%,var(--border-color) 50%,var(--bg-hover) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;"></div>
                    </div>
                </div>
            `).join('');
        }

        async function handleRemoveFromWishlist(courseId, btn) {
            const card = btn.closest('.wishlist-card');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-feather="loader" style="width:16px;height:16px;animation:spin 1s linear infinite;"></i> Đang xóa...';
            feather.replace();

            try {
                await ApiService.removeFromWishlist(courseId);
                ApiService.setWishlistCached(courseId, false);

                card.style.transition = 'opacity 0.3s, transform 0.3s';
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => card.remove(), 300);

                allWishlistItems = allWishlistItems.filter(item => item.courseId !== courseId);
                const total = allWishlistItems.length;
                document.getElementById('wishlistCount').textContent = total;

                if (total === 0) {
                    showEmptyState();
                }

                if (window.ToastManager) {
                    window.ToastManager.success('Đã xóa khỏi danh sách yêu thích');
                }
            } catch (err) {
                console.error('Remove from wishlist failed:', err);
                btn.disabled = false;
                btn.innerHTML = originalText;
                feather.replace();
                if (window.ToastManager) {
                    window.ToastManager.error('Không thể xóa khỏi wishlist');
                }
            }
        }

        async function handleEnrollFromWishlist(courseId, btn) {
            const token = window.AuthManager?.getToken?.();
            if (!token) {
                window.location.href = '/login?redirect=/courses/' + courseId;
                return;
            }

            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-feather="loader" style="width:14px;height:14px;animation:spin 1s linear infinite;"></i> Đang ghi danh...';
            feather.replace();

            try {
                const data = await ApiService.enrollInCourse(courseId);
                btn.className = 'enrolled-btn';
                btn.innerHTML = '<i data-feather="check-circle" style="width:14px;height:14px;"></i> Đã ghi danh!';
                feather.replace();

                if (window.ToastManager) {
                    window.ToastManager.success('Ghi danh thành công!');
                }

                // Remove from wishlist after enrolling
                setTimeout(async () => {
                    await ApiService.removeFromWishlist(courseId);
                    ApiService.setWishlistCached(courseId, false);
                    const card = btn.closest('.wishlist-card');
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    setTimeout(() => card.remove(), 300);

                    allWishlistItems = allWishlistItems.filter(item => item.courseId !== courseId);
                    document.getElementById('wishlistCount').textContent = allWishlistItems.length;
                    if (allWishlistItems.length === 0) showEmptyState();
                }, 1500);

            } catch (err) {
                console.error('Enroll failed:', err);
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                feather.replace();
                if (window.ToastManager) {
                    window.ToastManager.error(err.message || 'Ghi danh thất bại');
                }
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
    </script>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
