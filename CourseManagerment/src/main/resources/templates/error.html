<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${errorTitle != null ? errorTitle : 'Lỗi | CourseManager'}">Lỗi | CourseManager</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23ff6b35'>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-3xl) var(--spacing-lg);
            min-height: calc(100vh - 80px);
        }

        .error-container {
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: var(--spacing-lg);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.9;
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-lg);
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: var(--spacing-2xl);
        }

        .error-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-illustration {
            width: 200px;
            height: 200px;
            margin: 0 auto var(--spacing-2xl);
            position: relative;
        }

        .error-illustration img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.8;
        }

        /* Animation for the error code */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-container > * {
            animation: fadeInUp 0.6s ease forwards;
        }

        .error-container > *:nth-child(1) { animation-delay: 0.1s; opacity: 0; }
        .error-container > *:nth-child(2) { animation-delay: 0.2s; opacity: 0; }
        .error-container > *:nth-child(3) { animation-delay: 0.3s; opacity: 0; }
        .error-container > *:nth-child(4) { animation-delay: 0.4s; opacity: 0; }
        .error-container > *:nth-child(5) { animation-delay: 0.5s; opacity: 0; }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.5rem; }
            .error-actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <th:block th:insert="~{fragments/navbar :: navbar}"></th:block>

    <div class="error-page">
        <div class="error-container">
            <!-- Error Code -->
            <div class="error-code" th:text="${errorCode != null ? errorCode : '404'}">404</div>

            <!-- Illustration -->
            <div class="error-illustration">
                <img th:src="${errorCode == '500' ? 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400&h=400&fit=crop' : 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop'}"
                     alt="Error illustration">
            </div>

            <!-- Title -->
            <h1 class="error-title"
                th:text="${errorCode == '500' ? 'Lỗi máy chủ nội bộ' : 'Trang không tìm thấy'}"
                th:unless="${errorTitle != null}">
                <th:block th:if="${errorCode == '500'}">Lỗi máy chủ nội bộ</th:block>
                <th:block th:if="${errorCode == '403'}">Không có quyền truy cập</th:block>
                <th:block th:if="${errorCode == '401'}">Yêu cầu đăng nhập</th:block>
                <th:block th:if="${errorCode == '404' or errorCode == null}">Trang không tìm thấy</th:block>
            </h1>

            <h1 class="error-title" th:if="${errorTitle != null}" th:text="${errorTitle}">Lỗi</h1>

            <!-- Message -->
            <p class="error-message"
               th:text="${errorMessage != null ? errorMessage : 'Trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển. Vui lòng kiểm tra lại URL hoặc quay về trang chủ.'}">
                Trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.
            </p>

            <!-- Actions -->
            <div class="error-actions">
                <a href="/" class="btn btn-primary btn-lg">
                    <i data-feather="home" style="width:18px;height:18px;"></i>
                    Về trang chủ
                </a>
                <a href="/courses" class="btn btn-secondary btn-lg">
                    <i data-feather="book-open" style="width:18px;height:18px;"></i>
                    Khám phá khóa học
                </a>
                <button onclick="history.back()" class="btn btn-link btn-lg">
                    <i data-feather="arrow-left" style="width:18px;height:18px;"></i>
                    Quay lại
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2024 CourseManager</p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
