<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | Course Manager</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23ff6b35'>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    
    <style>
        .my-courses-page {
            padding: var(--spacing-xl) var(--spacing-lg);
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(255, 107, 53, 0.05) 100%);
            min-height: 100vh;
        }
        
        .my-courses-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            margin-bottom: var(--spacing-2xl);
        }
        
        .page-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: var(--spacing-lg);
        }
        
        .tab-nav button {
            background: none;
            border: none;
            padding: var(--spacing-md) 0;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
        }
        
        .tab-nav button:hover {
            color: var(--accent-primary);
        }
        
        .tab-nav button.active {
            color: var(--accent-primary);
        }
        
        .tab-nav button.active::after {
            content: '';
            position: absolute;
            bottom: -var(--spacing-lg);
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }
        
        /* Course Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
        }
        
        .course-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: var(--shadow);
        }
        
        .course-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.2);
        }
        
        .course-thumbnail {
            position: relative;
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-hover);
        }
        
        .course-thumbnail-container {
            position: relative;
            overflow: hidden;
        }
        
        .progress-badge {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            background: var(--bg-tertiary);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            z-index: 10;
        }
        
        .progress-badge.completed {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .progress-badge.in-progress {
            background: linear-gradient(135deg, var(--accent-primary), #fb923c);
            color: white;
        }
        
        .progress-badge.enrolled {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }
        
        .course-content {
            padding: var(--spacing-lg);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .course-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            line-height: 1.3;
            min-height: 50px;
        }
        
        .course-instructor {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            margin-bottom: var(--spacing-md);
        }
        
        /* Progress Section */
        .progress-section {
            margin-bottom: var(--spacing-lg);
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            font-size: 0.85rem;
        }
        
        .progress-label .label-text {
            color: var(--text-secondary);
        }
        
        .progress-label .percentage {
            color: var(--accent-primary);
            font-weight: 700;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-hover);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.5s ease;
            opacity: 0.8;
        }
        
        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
        }
        
        .course-meta-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .course-meta-item i {
            width: 16px;
            height: 16px;
        }
        
        /* Action Buttons */
        .course-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: auto;
        }
        
        .continue-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }
        
        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }
        
        .continue-btn.completed {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .more-btn {
            padding: 12px 16px;
            background: var(--bg-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .more-btn:hover {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--spacing-3xl);
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
        }
        
        .empty-state i {
            width: 80px;
            height: 80px;
            color: var(--text-tertiary);
            margin-bottom: var(--spacing-xl);
            opacity: 0.5;
        }
        
        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
        }
        
        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
        }
        
        .explore-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .explore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }
        
        /* Last Accessed */
        .last-accessed {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: var(--spacing-sm);
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.8rem;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }
            
            .tab-nav {
                overflow-x: auto;
                gap: var(--spacing-sm);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <th:block th:insert="~{fragments/navbar :: navbar}"></th:block>
    
    <!-- My Courses Page -->
    <div class="my-courses-page">
        <div class="my-courses-container">
            <!-- Page Header -->
            <div class="page-header">
                <h1>My Learning</h1>
                <p>Continue your journey and complete your courses</p>
            </div>
            
            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="active" onclick="filterCourses('all')">
                    All Courses
                </button>
                <button onclick="filterCourses('active')">
                    In Progress
                </button>
                <button onclick="filterCourses('completed')">
                    Completed
                </button>
            </div>
            
            <!-- Courses Grid -->
            <div class="courses-grid" id="coursesContainer">
                <!-- Courses will be loaded here by JavaScript -->
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Course Manager</h3>
                    <p>Learn programming the smart way.</p>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
    
    <script>
        // Global state
        let allEnrollments = [];
        let currentFilter = 'all';
        
        // Load enrollments on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadEnrollments();
        });
        
        /**
         * Load enrollments from API
         */
        async function loadEnrollments() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = '/login?redirect=/my-courses';
                return;
            }
            
            try {
                const endpoint = currentFilter === 'all' ? '/api/enrollments/my-courses' :
                                currentFilter === 'active' ? '/api/enrollments/active' :
                                '/api/enrollments/completed';
                
                const response = await fetch(endpoint + '?page=0&size=20', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load enrollments');
                }
                
                const data = await response.json();
                allEnrollments = data.content || [];
                renderCourses();
            } catch (error) {
                console.error('Error:', error);
                showEmptyState();
            }
        }
        
        /**
         * Filter courses by status
         */
        function filterCourses(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.tab-nav button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Reload data
            loadEnrollments();
        }
        
        /**
         * Render courses in grid
         */
        function renderCourses() {
            const container = document.getElementById('coursesContainer');
            
            if (allEnrollments.length === 0) {
                showEmptyState();
                return;
            }
            
            container.innerHTML = allEnrollments.map(enrollment => `
                <div class="course-card">
                    <div class="course-thumbnail-container">
                        <img src="${enrollment.courseThumbnail || 'https://via.placeholder.com/300x180'}" 
                             alt="${enrollment.courseTitle}" 
                             class="course-thumbnail">
                        <div class="progress-badge ${enrollment.status.toLowerCase()}">
                            <i data-feather="${getStatusIcon(enrollment.status)}"></i>
                            ${getStatusLabel(enrollment.status)}
                        </div>
                    </div>
                    
                    <div class="course-content">
                        <h3 class="course-title">${enrollment.courseTitle}</h3>
                        <p class="course-instructor">by ${enrollment.instructorName}</p>
                        
                        <div class="course-meta">
                            <span class="course-meta-item">
                                <i data-feather="book"></i>
                                ${enrollment.courseLevel}
                            </span>
                            <span class="course-meta-item">
                                <i data-feather="users"></i>
                                Started
                            </span>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-label">
                                <span class="label-text">Progress</span>
                                <span class="percentage">${Math.round(enrollment.progressPercentage || 0)}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${enrollment.progressPercentage || 0}%"></div>
                            </div>
                            <p class="last-accessed">
                                Last accessed: ${formatDate(enrollment.lastAccessedDate)}
                            </p>
                        </div>
                        
                        <div class="course-actions">
                            <button class="continue-btn ${enrollment.status === 'COMPLETED' ? 'completed' : ''}" 
                                    onclick="continueCourse(${enrollment.courseId})">
                                <i data-feather="${enrollment.status === 'COMPLETED' ? 'check-circle' : 'play-circle'}"></i>
                                ${enrollment.status === 'COMPLETED' ? 'View' : 'Continue'}
                            </button>
                            <button class="more-btn" onclick="courseOptions(${enrollment.id})">
                                <i data-feather="more-vertical"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            feather.replace();
        }
        
        /**
         * Show empty state
         */
        function showEmptyState() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = `
                <div style="grid-column: 1 / -1;">
                    <div class="empty-state">
                        <i data-feather="inbox"></i>
                        <h3>No courses yet</h3>
                        <p>Start learning by enrolling in a course from our catalog</p>
                        <a href="/courses" style="text-decoration: none;">
                            <button class="explore-btn">Explore Courses</button>
                        </a>
                    </div>
                </div>
            `;
            feather.replace();
        }
        
        /**
         * Get status icon
         */
        function getStatusIcon(status) {
            switch(status) {
                case 'COMPLETED': return 'check-circle';
                case 'IN_PROGRESS': return 'play-circle';
                default: return 'bookmark';
            }
        }
        
        /**
         * Get status label
         */
        function getStatusLabel(status) {
            switch(status) {
                case 'COMPLETED': return 'Completed';
                case 'IN_PROGRESS': return 'In Progress';
                default: return 'Enrolled';
            }
        }
        
        /**
         * Navigate to course learning page
         */
        function continueCourse(courseId) {
            window.location.href = `/learn/${courseId}`;
        }
        
        /**
         * Course options menu
         */
        function courseOptions(enrollmentId) {
            alert('More options coming soon: Share, Download, etc.');
        }
        
        /**
         * Format date
         */
        function formatDate(dateString) {
            if (!dateString) return 'Never';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString();
        }
    </script>
</body>
</html>
