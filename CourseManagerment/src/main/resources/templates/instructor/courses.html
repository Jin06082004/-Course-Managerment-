<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Instructor Panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/instructor.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    <script th:src="@{/js/auth.js}"></script>
</head>
<body class="instructor-app">
    <div th:replace="fragments/navbar"></div>
    
    <div class="instructor-container">
        <!-- Sidebar Menu -->
        <nav class="instructor-sidebar">
            <h3>Instructor Panel</h3>
            <ul>
                <li><a href="/instructor">Dashboard</a></li>
                <li><a href="/instructor/courses" class="active">My Courses</a></li>
                <li><a href="/instructor/courses/new">Create Course</a></li>
                <li><a href="/instructor/statistics">Statistics</a></li>
                <li><a href="/instructor/earnings">Earnings</a></li>
                <li><a href="/instructor/settings">Settings</a></li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <div class="instructor-content">
            <header class="instructor-page-header">
                <p class="eyebrow">Catalog</p>
                <h1>My courses</h1>
            </header>
            
            <div class="instructor-section">
                <a href="/instructor/courses/new" class="action-button" style="margin-bottom: 1rem;">+ Create new course</a>
                
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <select id="statusFilter" onchange="loadCourses(0)">
                        <option value="">All Status</option>
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="ARCHIVED">Archived</option>
                    </select>
                    <select id="levelFilter" onchange="loadCourses(0)">
                        <option value="">All Levels</option>
                        <option value="BEGINNER">Beginner</option>
                        <option value="INTERMEDIATE">Intermediate</option>
                        <option value="ADVANCED">Advanced</option>
                    </select>
                </div>
                
                <!-- Courses List -->
                <div id="coursesList">
                    <p style="text-align: center; color: #999;">Loading courses...</p>
                </div>
                
                <!-- Pagination -->
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPage = 0;
        const pageSize = 6;
        
        async function loadCourses(page = 0) {
            try {
                const headers = {
                    'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                    'Content-Type': 'application/json'
                };
                
                const status = document.getElementById('statusFilter').value;
                const level = document.getElementById('levelFilter').value;
                
                let url = `/api/instructor/courses?page=${page}&size=${pageSize}`;
                if (status) url += `&status=${status}`;
                if (level) url += `&level=${level}`;
                
                const response = await fetch(url, { headers });
                
                if (response.ok) {
                    const data = await response.json();
                    displayCourses(data.content);
                    displayPagination(data);
                    currentPage = page;
                } else {
                    document.getElementById('coursesList').innerHTML = 
                        '<p style="text-align: center; color: red;">Failed to load courses</p>';
                }
            } catch (error) {
                console.error('Error loading courses:', error);
                document.getElementById('coursesList').innerHTML = 
                    '<p style="text-align: center; color: red;">Error loading courses</p>';
            }
        }
        
        function displayCourses(courses) {
            const container = document.getElementById('coursesList');
            container.innerHTML = '';
            
            if (courses.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">No courses found. <a href="/instructor/courses/new">Create your first course!</a></p>';
                return;
            }
            
            courses.forEach(course => {
                const courseCard = document.createElement('div');
                courseCard.className = 'course-card';
                courseCard.innerHTML = `
                    <div class="course-header">
                        <h4>${course.title}</h4>
                        <div style="font-size: 13px;">Created: ${new Date(course.createdAt).toLocaleDateString()}</div>
                    </div>
                    <div class="course-body">
                        <p style="margin: 0 0 10px 0; color: #666;">${course.description || 'No description'}</p>
                        <div class="course-stats">
                            <div class="course-stat">
                                <div class="course-stat-number">${course.studentCount || 0}</div>
                                <div class="course-stat-label">Students</div>
                            </div>
                            <div class="course-stat">
                                <div class="course-stat-number">${course.level || 'N/A'}</div>
                                <div class="course-stat-label">Level</div>
                            </div>
                            <div class="course-stat">
                                <div class="course-stat-number">$${course.price || '0'}</div>
                                <div class="course-stat-label">Price</div>
                            </div>
                            <div class="course-stat">
                                <div class="course-stat-number">
                                    <span style="padding: 4px 8px; border-radius: 4px; font-size: 11px; ${course.status === 'PUBLISHED' ? 'background-color: #d4edda; color: #155724;' : course.status === 'ARCHIVED' ? 'background-color: #d1ecf1; color: #0c5460;' : 'background-color: #fff3cd; color: #856404;'}">
                                        ${course.status}
                                    </span>
                                </div>
                                <div class="course-stat-label">Status</div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                            <a href="/instructor/courses/${course.id}/edit" class="action-button">Edit</a>
                            <a href="/instructor/courses/${course.id}/students" class="action-button secondary">Students</a>
                            <a href="/instructor/courses/${course.id}/content" class="action-button secondary">Content</a>
                            <a href="/instructor/quiz-builder?courseId=${course.id}" class="action-button secondary">+ Quiz</a>
                            <a href="/instructor/exam-builder?courseId=${course.id}" class="action-button secondary">+ Exam</a>
                            <button class="action-button danger" onclick="deleteCourse(${course.id})">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(courseCard);
            });
        }
        
        function displayPagination(data) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            if (data.totalPages <= 1) return;
            
            // Previous button
            if (data.number > 0) {
                const prevBtn = document.createElement('a');
                prevBtn.textContent = '← Previous';
                prevBtn.onclick = () => loadCourses(data.number - 1);
                pagination.appendChild(prevBtn);
            }
            
            // Page numbers
            for (let i = 0; i < data.totalPages; i++) {
                const pageBtn = document.createElement(i === data.number ? 'span' : 'a');
                pageBtn.textContent = i + 1;
                if (i === data.number) {
                    pageBtn.classList.add('active');
                } else {
                    pageBtn.onclick = () => loadCourses(i);
                }
                pagination.appendChild(pageBtn);
            }
            
            // Next button
            if (data.number < data.totalPages - 1) {
                const nextBtn = document.createElement('a');
                nextBtn.textContent = 'Next →';
                nextBtn.onclick = () => loadCourses(data.number + 1);
                pagination.appendChild(nextBtn);
            }
        }
        
        async function deleteCourse(courseId) {
            if (!confirm('Are you sure you want to delete this course?')) return;
            
            try {
                const headers = {
                    'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                    'Content-Type': 'application/json'
                };
                
                const response = await fetch(`/api/instructor/courses/${courseId}`, {
                    method: 'DELETE',
                    headers: headers
                });
                
                if (response.ok) {
                    alert('Course deleted successfully');
                    loadCourses(currentPage);
                } else {
                    alert('Failed to delete course');
                }
            } catch (error) {
                console.error('Error deleting course:', error);
                alert('Error deleting course');
            }
        }
        
        // Load courses on page load
        document.addEventListener('DOMContentLoaded', () => loadCourses(0));
    </script>
</body>
</html>
