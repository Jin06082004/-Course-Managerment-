<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Course - Instructor Panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/instructor.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    <script th:src="@{/js/auth.js}"></script>
</head>
<body class="instructor-app">
    <div th:replace="fragments/navbar"></div>
    
    <div class="instructor-container">
        <!-- Sidebar Menu -->
        <nav class="instructor-sidebar">
            <h3>Instructor Panel</h3>
            <ul>
                <li><a href="/instructor">Dashboard</a></li>
                <li><a href="/instructor/courses">My Courses</a></li>
                <li><a href="/instructor/courses/new" class="active">Create Course</a></li>
                <li><a href="/instructor/statistics">Statistics</a></li>
                <li><a href="/instructor/earnings">Earnings</a></li>
                <li><a href="/instructor/settings">Settings</a></li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <div class="instructor-content">
            <header class="instructor-page-header">
                <p class="eyebrow">Courses</p>
                <h1>Create new course</h1>
            </header>
            
            <form class="form-section" id="createCourseForm">
                <h3>Course Information</h3>
                
                <div class="form-group">
                    <label for="title">Course Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Loading categories...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="level">Level</label>
                    <select id="level" name="level" required>
                        <option value="">Select a level...</option>
                        <option value="BEGINNER">Beginner</option>
                        <option value="INTERMEDIATE">Intermediate</option>
                        <option value="ADVANCED">Advanced</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" value="0">
                </div>

                <div class="form-group">
                    <label for="duration">Duration (hours)</label>
                    <input type="number" id="duration" name="duration" step="1" min="1" value="10">
                </div>
                
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-submit">Create Course</button>
                    <a href="/instructor/courses" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        async function loadCategories() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const res = await fetch('/api/instructor/categories', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const cats = await res.json();
                    const sel = document.getElementById('category');
                    sel.innerHTML = '<option value="">Select a category...</option>';
                    cats.forEach(c => {
                        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                    });
                } else if (res.status === 403) {
                    alert('Access denied. Instructors only.');
                    window.location.href = '/';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('createCourseForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const categoryId = parseInt(document.getElementById('category').value);
            const level = document.getElementById('level').value;
            const priceVal = parseFloat(document.getElementById('price').value) || 0;
            const durationVal = parseInt(document.getElementById('duration') ? document.getElementById('duration').value : '0') || 0;

            if (!title) { alert('Title is required'); return; }
            if (!description) { alert('Description is required'); return; }
            if (!categoryId) { alert('Please select a category'); return; }
            if (!level) { alert('Please select a level'); return; }

            const payload = {
                title,
                description,
                code: 'C' + Date.now(),
                categoryId,
                level,
                price: priceVal,
                duration: durationVal
            };

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const res = await fetch('/api/instructor/courses', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const course = await res.json();
                    alert('Course created as draft. On the next page, click "Publish Course" so it appears on Explore Courses (/courses).');
                    window.location.href = '/instructor/courses/' + course.id + '/edit';
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Failed to create course: ' + (err.error || res.statusText));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Course';
            }
        });

        document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
</body>
</html>
